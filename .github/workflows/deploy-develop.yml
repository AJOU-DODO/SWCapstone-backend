name: Java CI/CD with Docker Compose

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test --no-daemon

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 도커 허브 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create Firebase Directory
        run: mkdir -p src/main/resources/firebase
      # 2. Firebase 서비스 계정 키 생성
      - name: Create Firebase Service Account JSON
        uses: jsdaniell/create-json@v1.2.3
        with:
          name: "service-account.json"
          dir: "src/main/resources/firebase/"
          json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # 3. Buildx 빌더 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 2. 도커 이미지 빌드 및 푸시 (Dockerfile 내부 빌드 방식)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dodo-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # 빌드가 성공해야 배포 시작
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code (for docker-compose.yml)
        uses: actions/checkout@v4

      # 1. docker-compose.yml 파일을 EC2로 전송
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/app/" # 배포 경로 설정

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_LOCAL_PORT: ${{ secrets.DB_LOCAL_PORT }}
          DB_CONTAINER_PORT: ${{ secrets.DB_CONTAINER_PORT }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION_ACCESS: ${{ secrets.JWT_EXPIRATION_ACCESS }}
          JWT_EXPIRATION_REFRESH: ${{ secrets.JWT_EXPIRATION_REFRESH }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_CLOUDFRONT_DOMAIN: ${{ secrets.AWS_CLOUDFRONT_DOMAIN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_ROOT_PASSWORD,DB_NAME,DB_USERNAME,DB_PASSWORD,DB_LOCAL_PORT,DB_CONTAINER_PORT,REDIS_PORT,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,JWT_SECRET,JWT_EXPIRATION_ACCESS,JWT_EXPIRATION_REFRESH,AWS_ACCESS_KEY,AWS_SECRET_KEY,AWS_REGION,AWS_S3_BUCKET,AWS_CLOUDFRONT_DOMAIN
          script: |
            cd /home/ubuntu/app
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
